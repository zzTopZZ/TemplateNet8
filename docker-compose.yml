services:
  catalog.api:
    image: ${DOCKER_REGISTRY-}catalogapi
    container_name: catalog-api
    build:
      context: .
      dockerfile: Catalog.Api/Dockerfile
    ports:
      - "5000:8080"
      - "5001:8081"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ASPNETCORE_HTTPS_PORTS=8081
      - ConnectionStrings__DbConnection=Server=catalog.db;Database=CatalogDB;User Id=sa;Password=Catalog@2024!;TrustServerCertificate=True;
    depends_on:
      catalog.db:
        condition: service_healthy

  catalog.ui:
    image: ${DOCKER_REGISTRY-}catalogui
    container_name: catalog-ui
    build:
      context: .
      dockerfile: Catalog.Ui/Catalog.Ui/Dockerfile
    ports:
      - "7176:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - APIServer__Url=http://catalog-api:8080/api/v1/
    depends_on:
      - catalog.api

  catalog.db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: catalog-db
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=Catalog@2024!
    ports:
      - "1433:1433"
    volumes:
      - catalog-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "Catalog@2024!" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  catalog-data:
